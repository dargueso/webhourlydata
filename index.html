<!DOCTYPE html>
<html>
  <head>
    <meta charset='utf-8' />
    <title>Points on a map</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <script src='https://api.tiles.mapbox.com/mapbox-gl-js/v2.1.1/mapbox-gl.js'></script>
    <link href='https://api.tiles.mapbox.com/mapbox-gl-js/v2.1.1/mapbox-gl.css' rel='stylesheet' />
    <style>
      body {
        margin: 0;
        padding: 0;
      }

      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
      }
    </style>
  </head>
  <body>
  <style>
  * {
    -webkit-box-sizing: border-box;
    -moz-box-sizing: border-box;
    box-sizing: border-box;
  }

  body {
    color: #404040;
    font: 400 15px/22px 'Source Sans Pro', 'Helvetica Neue', Sans-serif;
    margin: 0;
    padding: 0;
    -webkit-font-smoothing: antialiased;
  }

  h1 {
    font-size: 22px;
    margin: 0;
    font-weight: 400;
    line-height: 20px;
    padding: 20px 2px;
  }

  a {
    color: #404040;
    text-decoration: none;
  }

  a:hover {
    color: #101010;
  }

  /* The page is split between map and sidebar - the sidebar gets 1/3, map
  gets 2/3 of the page. You can adjust this to your personal liking. */
  .sidebar {
    position: absolute;
    width: 33.3333%;
    height: 100%;
    top: 0;
    left: 0;
    overflow: hidden;
    border-right: 1px solid rgba(0, 0, 0, 0.25);
  }

  .map {
    position: absolute;
    left: 33.3333%;
    width: 66.6666%;
    top: 0;
    bottom: 0;
  }

  .heading {
    background: #fff;
    border-bottom: 1px solid #eee;
    height: 60px;
    line-height: 60px;
    padding: 0 10px;
  }

  /* Marker tweaks */
.mapboxgl-popup-close-button {
  display: none;
}

.mapboxgl-popup-content {
  font: 400 15px/22px 'Source Sans Pro', 'Helvetica Neue', Sans-serif;
  padding: 10px;
  width: 180px;
}

.mapboxgl-popup-content-wrapper {
  padding: 2%;
}

.mapboxgl-popup-content h3 {
  background: #808080;
  color: #fff;
  margin: 0;
  display: block;
  padding: 10px;
  border-radius: 3px 3px 0 0;
  font-weight: 700;
  margin-top: 0px;
}

.mapboxgl-popup-content h4 {
  margin: 0;
  display: block;
  padding: 10px;
  font-weight: 400;
}

.mapboxgl-popup-content div {
  padding: 10px;
}

.mapboxgl-container .leaflet-marker-icon {
  cursor: pointer;
}

.mapboxgl-popup-anchor-top > .mapboxgl-popup-content {
  margin-top: 15px;
}

.mapboxgl-popup-anchor-top > .mapboxgl-popup-tip {
  border-bottom-color: #91c949;
}
    #menu {
    background: #fff;
    position: absolute;
    z-index: 1;
    top: 10px;
    right: 10px;
    border-radius: 3px;
    width: 120px;
    border: 1px solid rgba(0, 0, 0, 0.4);
    font-family: 'Open Sans', sans-serif;
    }

    #menu a {
    font-size: 13px;
    color: #404040;
    display: block;
    margin: 0;
    padding: 0;
    padding: 10px;
    text-decoration: none;
    border-bottom: 1px solid rgba(0, 0, 0, 0.25);
    text-align: center;
    }

    #menu a:last-child {
    border: none;
    }

    #menu a:hover {
    background-color: #f8f8f8;
    color: #404040;
    }

    #menu a.active {
    background-color: #3887be;
    color: #ffffff;
    }

    #menu a.active:hover {
    background: #3074a4;
    }
    </style>

    <nav id="menu"></nav>
    <div id='map'></div>
    <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoienVtb2RlbHN1ciIsImEiOiJja2k0Z2Z2c2owOGlrMnFwYnR6aWgwYTRxIn0.fl4HqrLZncNLTtGhsK4P2w'; // replace this with your access token
    var map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/zumodelsur/ckll2fjxo0rs917ln82u42j3l', // replace this with your style URL
      center: [-5, 39],
      zoom: 4.26
    });
    // code from the next step will go here
      map.on('click', function(e) {
    var features = map.queryRenderedFeatures(e.point, {
      layers: ['prec','tmax','tmin'] // replace this with the name of the layer
    });

    if (!features.length) {
      return;
    }

    var feature = features[0];

    var popup = new mapboxgl.Popup({ offset: [0, -15] })
      .setLngLat(feature.geometry.coordinates)
      .setHTML('<h3>' + feature.properties.name + '</h3>' + '<br>' + 'prec: ' + feature.properties.prec + 'mm'
       + '<br>' + 'tmax: ' + feature.properties.tmax + '&#176C'
       + '<br>' + 'tmin: ' + feature.properties.tmin + '&#176C')
      .addTo(map);
      });




map.on('load', function () {
var url = 'https://dargueso.github.io/webhourlydata/AEMET.geojson';
map.addSource('AEMET', { type: 'geojson', data: url});

                'visibility': 'none'
            },
'paint': {

        ["exponential", 1],
        ["get", "prec"],
        0,
        "hsl(58, 80%, 61%)",
        1,
        "hsl(73, 65%, 62%)",

        "hsl(93, 43%, 62%)",

        20,

        30,
        "hsl(266, 85%, 15%)"
    ],
    "circle-stroke-width": 1.5
},
'filter': ['==', '$type', 'Point']

20, '#df4e4b',
22, '#b81e48',
24,'#9e0142'
    ],
    "circle-stroke-width": 1.5

'filter': ['==', '$type', 'Point']

map.addLayer({
'id': 'tmin',
'type': 'circle',
'source': 'AEMET',
'layout': {
                // make layer invisible by default
                'visibility': 'none'
            },
'paint': {
    "circle-color": [
        "interpolate",
        ["exponential", 1],
        ["get", "tmin"],
-10,'#5e4fa2',
-8, '#3880b9',

    "circle-radius": [
        "interpolate",
        ["linear"],

        0,

        6,
        8,

        16,
        20
    ],
    "circle-stroke-color": [
        "interpolate",
        ["exponential", 1],
        ["get", "tmin"],
-10,'#5e4fa2',

map.addLayer({
'id': 'Stations',
'type': 'circle',
'source': 'AEMET',
'layout': {
                // make layer invisible by default
                'visibility': 'visible'
            },
'paint': {
    "circle-opacity": 0.6,
    "circle-radius": 1,
    "circle-stroke-width": 0.5
},
});
});

// enumerate ids of the layers
var toggleableLayerIds = ['tmax','tmin', 'prec'];

// set up the corresponding toggle button for each layer
for (var i = 0; i < toggleableLayerIds.length; i++) {
var id = toggleableLayerIds[i];

var link = document.createElement('a');
link.href = '#';
link.className = '';
link.textContent = id;

link.onclick = function(e) {
  var clickedLayer = this.textContent;
  e.preventDefault();
  e.stopPropagation();
  for (var j = 0; j < toggleableLayerIds.length; j++) {
    if (clickedLayer === toggleableLayerIds[j]) {
      layers.children[j].className = 'active';
      map.setLayoutProperty(toggleableLayerIds[j], 'visibility', 'visible');
    }
    else {
      layers.children[j].className = '';
      map.setLayoutProperty(toggleableLayerIds[j], 'visibility', 'none');
    }
  }
};
