  .sidebar {

    left: 0;

.mapboxgl-popup-close-button {

.mapboxgl-popup-content {

.mapboxgl-popup-content-wrapper {

.mapboxgl-popup-content h3 {

.mapboxgl-popup-content h4 {

.mapboxgl-popup-content div {

.mapboxgl-container .leaflet-marker-icon {
  cursor: pointer;
}

.mapboxgl-popup-anchor-top > .mapboxgl-popup-content {

}

.mapboxgl-popup-anchor-top > .mapboxgl-popup-tip {

.legend {
  color: #fff;
  font: 1em/1.5em 'Open Sans', sans-serif;
  padding: 1em 2em 0em;
  /* top: 5em; */
  position: absolute;
  top: 95%;  /* position the top  edge of the element at the middle of the parent */
  left: 50%; /* position the left edge of the element at the middle of the parent */

  transform: translate(-50%, -50%); /* This is a shorthand of
                                       translateX(-50%) and translateY(-50%) */
  margin: 0em 5em;
  z-index: 100;
  opacity: 100%;
  display: none;
  flex-direction: row;

.legend h4 {
  margin: 0px 5px 5px;
  opacity: 100%;

.legend div span {

// enumerate ids of the layers
var toggleableLayerIds = ['tmax','tmin', 'prec','hrmean'];

// set up the corresponding toggle button for each layer
for (var i = 0; i < toggleableLayerIds.length; i++) {
var id = toggleableLayerIds[i];

var link = document.createElement('a');
link.href = '#';
link.className = '';
link.textContent = id;

link.onclick = function(e) {
  var clickedLayer = this.textContent;
  e.preventDefault();
  e.stopPropagation();
  for (var j = 0; j < toggleableLayerIds.length; j++) {
    if (clickedLayer === toggleableLayerIds[j]) {
      layers.children[j].className = 'active';
      map.setLayoutProperty(toggleableLayerIds[j], 'visibility', 'visible');
      map.setLayoutProperty('Stations_black', 'visibility', 'visible');
      document.getElementById(toggleableLayerIds[j] + "-legend").style.display = "flex";
    }
    else {
      layers.children[j].className = '';
      map.setLayoutProperty(toggleableLayerIds[j], 'visibility', 'none');
      map.setLayoutProperty('Stations_white', 'visibility', 'none');
      document.getElementById(toggleableLayerIds[j] + "-legend").style.display = "";
    }
  }
};
