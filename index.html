<!DOCTYPE html>
<html>
  <head>
    <meta charset='utf-8' />
    <title>Points on a map</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <script src='https://api.tiles.mapbox.com/mapbox-gl-js/v2.1.1/mapbox-gl.js'></script>
    <link href='https://api.tiles.mapbox.com/mapbox-gl-js/v2.1.1/mapbox-gl.css' rel='stylesheet' />
    <style>
      body {
        margin: 0;
        padding: 0;
      }

      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id='map'></div>
    <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoienVtb2RlbHN1ciIsImEiOiJja2k0Z2Z2c2owOGlrMnFwYnR6aWgwYTRxIn0.fl4HqrLZncNLTtGhsK4P2w'; // replace this with your access token
    var map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/zumodelsur/cklku2gxg1rmn17ms8akf8j1v/draft', // replace this with your style URL
      center: [-5, 39],
      zoom: 4.26
    });
    // code from the next step will go here
      map.on('click', function(e) {
    var features = map.queryRenderedFeatures(e.point, {
      layers: ['Stations'] // replace this with the name of the layer
    });

    if (!features.length) {
      return;
    }

    var feature = features[0];

    var popup = new mapboxgl.Popup({ offset: [0, -15] })
      .setLngLat(feature.geometry.coordinates)
      .setHTML('<h3>' + feature.properties.name + '</h3>')
      .addTo(map);
      });

map.on('load', function () {
var url = 'https://github.com/dargueso/webhourlydata/blob/main/AEMET.geojson';
map.addSource('AEMET', { type: 'geojson', data: url});
map.addLayer({
'id': 'AEMET',
'type': 'circle',
'source': 'AEMET',
'paint': {
'circle-radius': 20,
'circle-color': '#B42222'
},
'filter': ['==', '$type', 'Point']
});
});



    //
    // map.addSource('AEMETdata', { type: 'geojson', data: https://meteorologia.uib.es/hoyextremo/AEMET.geojson});
    // map.addLayer({
    //   'id': 'AEMETdata',
    //   'type': 'symbol',
    //   'source': 'AEMETdata',
    //   'layout': {
    //           'icon-image': 'rocket-15'
    //           'icon-allow-overlap': true,}
    //           });

    </script>
  </body>
</html>
